        const timestamp = Math.floor(Date.now() / 1000);
        document.getElementById('requestBody').value = JSON.stringify({
            "Req_type": "validation",
            "Tran_id": "AXIS-" + todayDate.replace(/-/g, '') + "-" + timestamp,
            "Req_date": todayDate,
            "UTR": "UTR" + todayDate.replace(/-/g, '') + timestamp,
            "Bene_acc_no": "IACS1234",
            "Corp_code": "IACS",
            "Txn_amnt": "1000.00",
            "Pmode": "NEFT",
            "Sndr_acnt": "1234567890",
            "Sndr_ifsc": "UTIB0000001",
            "Sndr_nm": "Test Customer Pvt Ltd"
        }, null, 2);

        // HMAC-SHA256 signature generation
        async function hmacSha256(secret, message) {
            const encoder = new TextEncoder();
            const keyData = encoder.encode(secret);
            const messageData = encoder.encode(message);

            const cryptoKey = await window.crypto.subtle.importKey(
                'raw',
                keyData,
                { name: 'HMAC', hash: 'SHA-256' },
                false,
                ['sign']
            );

            const signatureBuffer = await window.crypto.subtle.sign('HMAC', cryptoKey, messageData);
            
            return Array.from(new Uint8Array(signatureBuffer))
                .map(b => b.toString(16).padStart(2, '0'))
                .join('');
        }

        // Generic API call function
        async function callAPI(endpoint, requestType) {
            const baseUrl = document.getElementById('baseUrl').value;
            const apiKey = document.getElementById('apiKey').value;
            const sharedSecret = document.getElementById('sharedSecret').value;
            const requestBodyRaw = document.getElementById('requestBody').value;

            if (!baseUrl || !apiKey || !sharedSecret) {
                alert('Please fill in all configuration fields.');
                return null;
            }

            let requestBody = '';
            let requestBodyObj = null;
            try {
                requestBodyObj = JSON.parse(requestBodyRaw);
                // Update Req_type based on endpoint
                requestBodyObj.Req_type = requestType;
                requestBody = JSON.stringify(requestBodyObj);
            } catch (error) {
                alert('Invalid JSON in Request Body. Please correct it and try again.\nError: ' + error.message);
                return null;
            }

            const httpMethod = 'POST';
            const timestamp = Math.floor(Date.now() / 1000);
            
            // For signature: use simplified path without /functions/v1
            const signaturePath = endpoint.replace('/functions/v1', '');
            const payloadString = `${httpMethod}${signaturePath}${requestBody}${timestamp}`;
            
            try {
                const signature = await hmacSha256(sharedSecret, payloadString);
                
                const startTime = Date.now();
                
                const response = await fetch(baseUrl + endpoint, {
                    method: httpMethod,
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-KEY': apiKey,
                        'X-Timestamp': timestamp.toString(),
                        'X-Signature': signature
                    },
                    body: requestBody
                });

                const duration = Date.now() - startTime;
                const responseData = await response.json();

                return {
                    success: response.ok,
                    status: response.status,
                    statusText: response.statusText,
                    headers: Object.fromEntries(response.headers.entries()),
                    data: responseData,
                    duration: duration,
                    request: {
                        endpoint: endpoint,
                        signaturePath: signaturePath,
                        timestamp: timestamp,
                        signature: signature,
                        body: requestBody,
                        payloadString: payloadString
                    }
                };

            } catch (error) {
                return {
                    success: false,
                    error: error.message,
                    request: {
                        endpoint: endpoint,
                        signaturePath: signaturePath,
                        body: requestBody
                    }
                };
            }
        }

        // Display API result
        function displayResult(result, resultDivId, apiName) {
            const resultDiv = document.getElementById(resultDivId);
            
            if (!result) {
                resultDiv.style.display = 'none';
                return;
            }

            const isSuccess = result.success && !result.error;
            const statusClass = isSuccess ? 'success' : 'error';
            const statusBadge = isSuccess ? 
                `<span class="status-badge success">✓ ${result.status} ${result.statusText}</span>` :
                `<span class="status-badge error">✗ ${result.error || result.status + ' ' + result.statusText}</span>`;

            let html = `
                <div class="api-response ${statusClass}">
                    <h3>${apiName} ${statusBadge}</h3>
                    ${result.duration ? `<p><strong>Response Time:</strong> ${result.duration}ms</p>` : ''}
                    
                    <div class="result-item">
                        <label><strong>Request Details:</strong></label>
                        <code>Endpoint: ${result.request.endpoint}
Timestamp: ${result.request.timestamp}
Signature: ${result.request.signature}

Payload String:
${result.request.payloadString || 'N/A'}

Request Body:
${result.request.body}</code>
                    </div>

                    ${result.data ? `
                    <div class="result-item">
                        <label><strong>Response Data:</strong></label>
                        <pre>${JSON.stringify(result.data, null, 2)}</pre>
                    </div>
                    ` : ''}

                    ${result.error ? `
                    <div class="result-item">
                        <label><strong>Error:</strong></label>
                        <code style="color: #fc8181;">${result.error}</code>
                    </div>
                    ` : ''}
                </div>
            `;

            resultDiv.innerHTML = html;
            resultDiv.style.display = 'block';
        }

        // Event Listeners
        document.getElementById('testValidationBtn').addEventListener('click', async function() {

        // Generate fresh payload with current timestamp
        function generateFreshPayload(testCase) {
            const timestamp = Date.now();
            const today = new Date().toISOString().split('T')[0];
            const xssPayload = '<script>alert(1)<\/script>';
            
            // Convert to JSON string, replace templates, then parse back
            let payloadStr = JSON.stringify(testCase.payload);
            payloadStr = payloadStr.replace(/\{\{timestamp\}\}/g, timestamp);
            payloadStr = payloadStr.replace(/\{\{today\}\}/g, today);
            payloadStr = payloadStr.replace(/\{\{xss_payload\}\}/g, xssPayload);
            
            return JSON.parse(payloadStr);
        }

        document.getElementById('loadTestCaseBtn').addEventListener('click', function() {

        // Generate curl commands
        document.getElementById('generateCurlBtn').addEventListener('click', async function() {
            const baseUrl = document.getElementById('baseUrl').value;
            const apiKey = document.getElementById('apiKey').value;
            const sharedSecret = document.getElementById('sharedSecret').value;
            const requestBodyRaw = document.getElementById('requestBody').value;

            if (!baseUrl || !apiKey || !sharedSecret) {
                alert('Please fill in all configuration fields.');
                return;
            }

            let requestBodyObj;
            try {
                requestBodyObj = JSON.parse(requestBodyRaw);
            } catch (error) {
                alert('Invalid JSON in Request Body.');
                return;
            }

            const curlDiv = document.getElementById('curlOutput');
            curlDiv.innerHTML = '<div class="result"><h3>📋 Generated Curl Commands</h3></div>';
            
            // Generate for validation
            const validationBody = {...requestBodyObj, Req_type: 'validation'};
            const validationBodyStr = JSON.stringify(validationBody);
            const validationTimestamp = Math.floor(Date.now() / 1000);
            const validationEndpoint = '/functions/v1/axis-bank-validation';
            const validationSignaturePath = '/axis-bank-validation';  // Path for signature calculation
            const validationPayloadString = `POST${validationSignaturePath}${validationBodyStr}${validationTimestamp}`;
            const validationSignature = await hmacSha256(sharedSecret, validationPayloadString);

            let curlValidation = `curl -X POST '${baseUrl}${validationEndpoint}' \\
  -H 'Content-Type: application/json' \\
  -H 'X-API-KEY: ${apiKey}' \\
  -H 'X-Timestamp: ${validationTimestamp}' \\
  -H 'X-Signature: ${validationSignature}' \\
  -d '${validationBodyStr}'`;

            // Generate for posting
            const postingBody = {...requestBodyObj, Req_type: 'notification'};
            const postingBodyStr = JSON.stringify(postingBody);
            const postingTimestamp = validationTimestamp + 2; // Slightly different timestamp
            const postingEndpoint = '/functions/v1/axis-bank-posting';
            const postingSignaturePath = '/axis-bank-posting';  // Path for signature calculation
            const postingPayloadString = `POST${postingSignaturePath}${postingBodyStr}${postingTimestamp}`;
            const postingSignature = await hmacSha256(sharedSecret, postingPayloadString);

            let curlPosting = `curl -X POST '${baseUrl}${postingEndpoint}' \\
  -H 'Content-Type: application/json' \\
  -H 'X-API-KEY: ${apiKey}' \\
  -H 'X-Timestamp: ${postingTimestamp}' \\
  -H 'X-Signature: ${postingSignature}' \\
  -d '${postingBodyStr}'`;

            curlDiv.innerHTML += 
                '<div class="result-item">' +
                    '<label><strong>1️⃣ Validation API Curl:</strong></label>' +
                    '<code>' + curlValidation + '</code>' +
                    '<button onclick="copyToClipboard(this, \'validation\')" style="margin-top: 0.5rem;">📋 Copy Validation Curl</button>' +
                '</div>' +
                '<div class="result-item">' +
                    '<label><strong>2️⃣ Posting API Curl:</strong></label>' +
                    '<code>' + curlPosting + '</code>' +
                    '<button onclick="copyToClipboard(this, \'posting\')" style="margin-top: 0.5rem;">📋 Copy Posting Curl</button>' +
                '</div>' +
                '<div class="info-box">' +
                    '<strong>Usage:</strong> Copy these commands and run them in your terminal. Run validation first, then posting.' +
                    '<br><br>' +
                    '<strong>Tip:</strong> Add <code>| jq</code> at the end for pretty JSON output (requires jq installed).' +
                '</div>';
            curlDiv.style.display = 'block';

            // Store for copying
            window.curlCommands = {
                validation: curlValidation,
                posting: curlPosting
            };
        });

        // Copy to clipboard function
        window.copyToClipboard = function(button, type) {
            const text = window.curlCommands[type];
            navigator.clipboard.writeText(text).then(() => {
                const originalText = button.innerHTML;
                button.innerHTML = '✓ Copied!';
                button.style.backgroundColor = '#48bb78';
                setTimeout(() => {
                    button.innerHTML = originalText;
                    button.style.backgroundColor = '';
                }, 2000);
            }).catch(err => {
                alert('Failed to copy: ' + err);
            });
        };
    </script>
